name: Playwright Tests + Allure Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests & Publish Allure Report
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Run tests
      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      # 6. Install Allure CLI
      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline --save-dev

      # 7. Restore Allure history from gh-pages
      - name: Restore Allure history
        if: always()
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1
          mkdir -p allure-results/history
          git show origin/gh-pages:history 2>/dev/null | tar -x -C allure-results/history || true

      # 8. Generate Allure report
      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # 9. Publish Allure report to GitHub Pages
      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
